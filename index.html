<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homnivas Finance Network</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/32/merchant-account.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#020c1b">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#020c1b',
                        glassBg: 'rgba(10, 25, 47, 0.7)',
                        goldAccent: '#cca43b'
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(10, 25, 47, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(204, 164, 59, 0.15);
        }
        /* Fix icon alignment */
        .material-symbols-rounded {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-darkBg text-slate-200 min-h-screen flex flex-col font-sans selection:bg-goldAccent/30">

    <header class="p-4 flex justify-between items-center border-b border-goldAccent/10 bg-darkBg/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <span class="text-goldAccent font-bold text-lg tracking-wider">HOMNIVAS</span>
            <span class="text-xs bg-goldAccent/10 text-goldAccent px-2 py-0.5 rounded border border-goldAccent/20">FINANCE</span>
        </div>
        <div class="bg-slate-900/80 rounded-full p-1 border border-slate-800 text-xs flex gap-1 font-medium">
            <button class="px-2.5 py-1 rounded-full bg-goldAccent text-darkBg font-bold transition-all">ENG</button>
            <button class="px-2.5 py-1 rounded-full text-slate-400 hover:text-slate-200 transition-all">বাং</button>
            <button class="px-2.5 py-1 rounded-full text-slate-400 hover:text-slate-200 transition-all">हिं</button>
        </div>
    </header>

    <main id="app-container" class="flex-1 p-4 max-w-md mx-auto w-full pb-24">
        <div id="ai-chat-view" class="space-y-4">
            <div class="glass-card rounded-2xl p-4 text-center space-y-2 mb-4">
                <h2 class="text-goldAccent font-semibold text-lg">Welcome to HFN Partner Network</h2>
                <p class="text-xs text-slate-400">Tell me about your client's profile or copy-paste their details below. I will instantly evaluate eligibility.</p>
            </div>
            
            <div id="chat-log" class="space-y-3 min-h-[250px] max-h-[400px] overflow-y-auto p-2">
                <div class="flex gap-2">
                    <div class="glass-card rounded-2xl rounded-tl-none p-3 text-xs max-w-[85%] text-slate-300">
                        Hello! I am <strong>Homnivas Loan Mitra</strong>. How can I assist you with your Home, Business, or Personal Loan file today?
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-2 mt-2">
                <input type="text" id="chat-input" placeholder="Type or paste client file data here..." class="flex-1 bg-slate-900/60 border border-slate-800 focus:border-goldAccent/50 rounded-xl px-4 py-3 text-xs outline-none transition-all placeholder:text-slate-500 text-slate-200">
                <button onclick="sendMessageToBackend()" class="bg-goldAccent hover:bg-goldAccent/90 text-darkBg p-3 rounded-xl transition-all font-bold text-xs shadow-lg shadow-goldAccent/10 flex items-center justify-center">
                    <span class="material-symbols-rounded text-[20px]">send</span>
                </button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-slate-800/80 bg-darkBg/90 backdrop-blur-lg py-2.5 z-50">
        <div class="max-w-md mx-auto flex justify-around items-center text-center">
            <button class="flex flex-col items-center gap-1 text-goldAccent group">
                <span class="material-symbols-rounded text-[28px]">smart_toy</span>
                <span class="text-[10px] font-medium tracking-wide">AI Mitra</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300 group">
                <span class="material-symbols-rounded text-[28px]">folder_managed</span>
                <span class="text-[10px] font-medium tracking-wide">Clients</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300 group">
                <span class="material-symbols-rounded text-[28px]">account_balance_wallet</span>
                <span class="text-[10px] font-medium tracking-wide">Wallet</span>
            </button>
        </div>
    </nav>

    <script src="/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
